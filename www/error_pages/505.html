<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Error 505 - HTTP Version Not Supported</title>
    <style>
        body {
            background-color: #000000;
            color: #f8f9fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            border-right: 2px solid #dee2e6;
            padding-right: 20px;
            margin-right: 20px;
            display: inline-block;
        }

        h1 {
            font-size: 24px;
            font-weight: 500;
            margin: 0;
            line-height: 1;
        }

        .message {
            display: inline-block;
            font-size: 14px;
            font-weight: 400;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>505</h1>
    </div>
    <div class="message">
        <p>HTTP Version Not Supported</p>
    </div>
</body>

</html>
