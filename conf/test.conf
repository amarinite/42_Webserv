server {
    listen 8080;
	root ./www;

    error_page 404 /error_pages/404.html;
    error_page 500 /error_pages/500.html;

    client_max_body_size 1024;

    location /home/ {
        root ./www/html;
        allowed_methods GET POST DELETE;
        autoindex on;
        index index.html;
    }

    location /upload {
        root ./www/uploads;
        allowed_methods POST;
        upload_store ./www/uploads;
    }

    location /old {
        redirect /new;
    }

    location /cgi {
        root ./www/scripts;
        cgi_extension .php ./cgi-bin/php-cgi;
    }
}

# Second server on another port
server {
    listen 9090;
	root ./www;

    location / {
        root ./www/admin;
        allowed_methods GET;
    }
}